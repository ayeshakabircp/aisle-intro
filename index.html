<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aisle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400;1,500&family=Italiana&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- LAYER 1: BG image -->
  <div id="room-bg-wrap">
    <img id="room-bg" src="/room-bg.png" alt=""/>
  </div>

  <!-- LAYER 2: Three.js canvas — transparent, garments only -->
  <canvas id="room-canvas"></canvas>

  <!-- LAYER 3: Grain -->
  <canvas id="grain-canvas"></canvas>

  <!-- LAYER 4: SVG garments (hidden) -->
  <div id="garment-layer"></div>

  <!-- LAYER 5: Word text -->
  <div id="headline"><div id="word-display"></div></div>

  <!-- LAYER 5b: Introducing -->
  <div id="introducing-text">Introducing</div>

  <!-- LAYER 6: Aisle reveal -->
  <div id="intro-wrap">
    <div id="aisle-reveal">
      <div id="aisle-name">Aisle</div>
      <div id="aisle-sub">Your in-store personal assistant.</div>
      <div id="scroll-ind">
        <div class="si-label">scroll</div>
        <div class="si-track"></div>
        <div class="si-arrow"></div>
      </div>
    </div>
  </div>

  <!-- Replay -->
  <button id="replay-btn" onclick="replayIntro()">↺ Replay</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="room.js"></script>
  <script src="intro.js"></script>
  <script src="main.js"></script>
</body>
</html>
