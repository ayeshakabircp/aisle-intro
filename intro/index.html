<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aisle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400;1,500&family=Italiana&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Mobile portrait gate -->
  <div id="rotate-gate">
    <div>
      <span class="rg-icon">⤵</span>
      <div class="rg-text">Rotate your device to view Aisle</div>
    </div>
  </div>

  <!-- LAYER 1: Video — corridor push -->
  <video id="video-corridor" src="corridor.mp4" muted playsinline preload="auto"></video>

  <!-- LAYER 1a-ii: Corridor-only grain — 30% strength, fades with garments -->
  <canvas id="corridor-grain-canvas"></canvas>

  <!-- LAYER 1b: Kiosk static image (replaces video 2) -->
  <div id="kiosk-layer">
    <img id="kiosk-img" src="kiosk-image.png" alt=""/>
  </div>

  <!-- LAYER 1b-i: Hover zones for kiosk image features (top 3/4 height only) -->
  <div id="kiosk-hover-zones"></div>

  <!-- LAYER 1b-iii: Kiosk screen glow — appears on View Prototype click -->
  <div id="screen-glow"></div>

  <!-- LAYER 1c: Blinding white flash — preserved even though video 2 is now an image -->
  <div id="white-flash"></div>

  <!-- LAYER 2: Grain (over everything, adjustable via devtools CSS var) -->
  <canvas id="grain-canvas"></canvas>

  <!-- LAYER 3: Garment overlay (Three.js, transparent, real depth/parallax) -->
  <canvas id="garment-3d-layer"></canvas>

  <!-- LAYER 4: Word text -->
  <div id="headline"><div id="word-display"></div></div>

  <!-- LAYER 4b: Introducing -->
  <div id="introducing-text">Introducing</div>

  <!-- LAYER 4c: Full-screen champagne backing — reveal stage only, sits under Aisle text -->
  <div id="aisle-backing"></div>

  <!-- LAYER 5: Aisle reveal -->
  <div id="intro-wrap">
    <div id="aisle-reveal">
      <div id="aisle-name">Aisle</div>
      <div id="aisle-sub">Your in-store personal assistant.</div>
      <div id="scroll-ind">
        <div class="si-label">scroll</div>
        <div class="si-track"></div>
        <div class="si-arrow"></div>
      </div>
    </div>
  </div>

  <!-- Skip Intro / Replay button -->
  <button id="skip-replay-btn" onclick="handleSkipReplay()">Skip Intro</button>

  <!-- View Prototype button -->
  <button id="view-proto-btn" onclick="handleViewPrototype()">View Prototype</button>

  <!-- Particle canvas for scroll dissolve -->
  <canvas id="particle-canvas"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="grain.js"></script>
  <script src="garments3d.js"></script>
  <script src="corridorgrain.js"></script>
  <script src="hoverlays.js"></script>
  <script src="intro.js"></script>
  <script src="particles.js"></script>
  <script src="main.js"></script>
</body>
</html>
